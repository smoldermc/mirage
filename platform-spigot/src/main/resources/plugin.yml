name: Mirage
version: ${version}
main: fr.smolder.mirage.spigot.MirageSpigotPlugin
api-version: "1.21"
authors: [smolder]
description: Platform adapter scaffold for the Mirage image MOTD project.
commands:
  mirage:
    description: Reload Mirage state
    usage: /mirage
    permission: mirage.command.reload
permissions:
  mirage.command.reload:
    description: Allows reloading Mirage using /mirage
    default: op
